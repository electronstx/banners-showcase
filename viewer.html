<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Просмотр баннера</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .toolbar {
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .toolbar-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toolbar-group + .toolbar-group {
        padding-left: 12px;
        border-left: 1px solid #0f3460;
      }

      .toolbar-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #7f8c8d;
        white-space: nowrap;
      }

      .btn {
        padding: 8px 16px;
        border: 1px solid #0f3460;
        border-radius: 6px;
        background: #16213e;
        color: #e0e0e0;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }

      .btn:hover {
        background: #1a365d;
        border-color: #2980b9;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn.primary {
        background: #2980b9;
        border-color: #3498db;
        color: #fff;
      }
      .btn.primary:hover {
        background: #3498db;
      }
      .btn.success {
        background: #27ae60;
        border-color: #2ecc71;
        color: #fff;
      }
      .btn.success:hover {
        background: #2ecc71;
      }
      .btn.warning {
        background: #e67e22;
        border-color: #f39c12;
        color: #fff;
      }
      .btn.warning:hover {
        background: #f39c12;
      }

      select {
        padding: 8px 12px;
        border: 1px solid #0f3460;
        border-radius: 6px;
        background: #16213e;
        color: #e0e0e0;
        font-size: 13px;
        cursor: pointer;
      }

      input[type="number"] {
        width: 70px;
        padding: 8px;
        border: 1px solid #0f3460;
        border-radius: 6px;
        background: #16213e;
        color: #e0e0e0;
        font-size: 13px;
        text-align: center;
      }

      .viewport {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
      }

      .frame-wrapper {
        position: relative;
        background: #fff;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        border-radius: 4px;
        overflow: hidden;
      }

      .frame-wrapper iframe {
        display: block;
        border: none;
        width: 100%;
        height: 100%;
      }

      .size-badge {
        position: absolute;
        bottom: -28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: #7f8c8d;
        white-space: nowrap;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 12px;
        padding: 30px;
        text-align: center;
        max-width: 360px;
        width: 90%;
      }

      .modal h3 {
        margin-bottom: 8px;
        color: #fff;
      }
      .modal p {
        font-size: 13px;
        color: #7f8c8d;
        margin-bottom: 20px;
      }
      .modal canvas {
        border-radius: 8px;
      }
      .modal .btn {
        margin-top: 16px;
      }

      .custom-size {
        display: none;
        align-items: center;
        gap: 6px;
      }
      .custom-size.active {
        display: flex;
      }

      input[type="range"] {
        width: 100px;
        accent-color: #2980b9;
      }

      .scale-value {
        font-size: 12px;
        color: #7f8c8d;
        min-width: 36px;
        text-align: center;
      }

      @media (max-width: 900px) {
        .toolbar {
          padding: 8px 12px;
          gap: 8px;
        }
        .toolbar-group + .toolbar-group {
          padding-left: 8px;
        }
        .toolbar-group {
          flex-wrap: wrap;
        }
        .toolbar-label {
          width: 100%;
        }
        .btn {
          padding: 6px 10px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="toolbar-group">
        <span class="toolbar-label">Анимация</span>
        <button
          class="btn success"
          onclick="doLaunch()"
          title="Запустить анимацию"
        >
          &#9654; Launch
        </button>
        <button
          class="btn warning"
          onclick="doPause()"
          title="Поставить на паузу"
        >
          &#10074;&#10074; Pause
        </button>
        <button
          class="btn primary"
          onclick="doResume()"
          title="Продолжить анимацию"
        >
          &#9654;&#xFE0E; Resume
        </button>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label">Размер</span>
        <select id="size-select" onchange="onSizeChange()">
          <option value="vk">VK (1177 &times; 873)</option>
          <option value="vk-tgb">VK TGB (158 &times; 300)</option>
          <option value="ok">OK (1080 &times; 810)</option>
          <option value="zen">Zen (1200 &times; 900)</option>
          <option value="zen-game">Zen Game (1150 &times; 650)</option>
          <option value="zen-game-portrait">
            Zen Game Portrait (390 &times; 650)
          </option>
          <option value="custom">Свой размер...</option>
        </select>
        <div class="custom-size" id="custom-size">
          <input
            type="number"
            id="custom-w"
            placeholder="W"
            min="50"
            max="3000"
            value="300"
          />
          <span>&times;</span>
          <input
            type="number"
            id="custom-h"
            placeholder="H"
            min="50"
            max="3000"
            value="250"
          />
          <button class="btn" onclick="applyCustomSize()">OK</button>
        </div>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label">Масштаб</span>
        <input
          type="range"
          id="scale-slider"
          min="25"
          max="200"
          value="100"
          oninput="onScaleChange()"
        />
        <span class="scale-value" id="scale-value">100%</span>
      </div>

      <div class="toolbar-group">
        <button class="btn" onclick="showQR()" title="QR-код для телефона">
          &#9641; QR-код
        </button>
        <button class="btn" onclick="copyLink(this)" title="Скопировать ссылку">
          &#128203; Копировать ссылку
        </button>
      </div>
    </div>

    <div class="viewport">
      <div style="position: relative">
        <div class="frame-wrapper" id="frame-wrapper">
          <iframe
            id="banner-frame"
            sandbox="allow-scripts allow-same-origin"
          ></iframe>
        </div>
        <div class="size-badge" id="size-badge"></div>
      </div>
    </div>

    <div class="modal-overlay" id="qr-modal" onclick="closeQR(event)">
      <div class="modal">
        <h3>QR-код</h3>
        <p>Отсканируйте для просмотра на телефоне</p>
        <div id="qr-container"></div>
        <button class="btn" onclick="closeQR()">Закрыть</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
      const USER = "electronstx";
      const REPO = "banners-showcase";
      const PROJECTS_PATH = "projects";

      const SIZE_PRESETS = {
        vk: { width: 1177, height: 873 },
        "vk-tgb": { width: 158, height: 300 },
        ok: { width: 1080, height: 810 },
        zen: { width: 1200, height: 900 },
        "zen-game": { width: 1150, height: 650 },
        "zen-game-portrait": { width: 390, height: 650 },
      };

      const params = new URLSearchParams(window.location.search);
      const clientName = params.get("client");
      const projectName = params.get("project");
      const initialSize = params.get("size") || "vk";

      if (!clientName || !projectName) {
        document.body.innerHTML =
          '<div style="padding:40px;text-align:center;color:#e74c3c;">' +
          "<h2>Ошибка</h2><p>Не указаны параметры client и project в URL.</p>" +
          '<p style="color:#7f8c8d;margin-top:12px;">Формат: viewer.html?client=имя&project=кампания</p></div>';
        throw new Error("Missing params");
      }

      const bannerUrl = `https://${USER}.github.io/${REPO}/${PROJECTS_PATH}/${clientName}/${projectName}/index.html`;
      const frame = document.getElementById("banner-frame");
      const wrapper = document.getElementById("frame-wrapper");
      const badge = document.getElementById("size-badge");
      const sizeSelect = document.getElementById("size-select");

      const onScaleChange = () => {
        const scale = document.getElementById("scale-slider").value / 100;
        document.getElementById("scale-value").textContent =
          Math.round(scale * 100) + "%";

        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.transformOrigin = "top left";

        const w = parseInt(wrapper.style.width) || 0;
        const h = parseInt(wrapper.style.height) || 0;
        wrapper.parentElement.style.width = w * scale + "px";
        wrapper.parentElement.style.height = h * scale + "px";
      };

      const autoFitScale = () => {
        const viewportEl = document.querySelector(".viewport");
        const availableWidth = viewportEl.clientWidth;
        const availableHeight = viewportEl.clientHeight;
        const wrapperWidth = parseInt(wrapper.style.width);
        const wrapperHeight = parseInt(wrapper.style.height);

        if (!wrapperWidth || !wrapperHeight || availableWidth <= 0) return;

        let fitScale = 100;

        if (wrapperWidth > availableWidth) {
          fitScale = Math.floor((availableWidth / wrapperWidth) * 100);
        }

        fitScale = Math.max(fitScale, 10);
        document.getElementById("scale-slider").value = fitScale;
        onScaleChange();
      };

      const setSize = (w, h) => {
        wrapper.style.width = w + "px";
        wrapper.style.height = h + "px";
        badge.textContent = `${w} × ${h}`;
        autoFitScale();
      };

      const applyCustomSize = () => {
        const w = parseInt(document.getElementById("custom-w").value) || 300;
        const h = parseInt(document.getElementById("custom-h").value) || 250;
        setSize(w, h);
      };

      const onSizeChange = () => {
        const val = sizeSelect.value;
        const customEl = document.getElementById("custom-size");

        if (val === "custom") {
          customEl.classList.add("active");
          applyCustomSize();
        } else {
          customEl.classList.remove("active");
          const preset = SIZE_PRESETS[val];
          if (preset) setSize(preset.width, preset.height);
        }
      };

      const doLaunch = () => {
        try {
          frame.contentWindow.client_message_launch();
        } catch (e) {
          console.warn("client_message_launch() unavailable:", e);
        }
      };

      const doPause = () => {
        try {
          frame.contentWindow.client_message_pause();
        } catch (e) {
          console.warn("client_message_pause() unavailable:", e);
        }
      };

      const doResume = () => {
        try {
          frame.contentWindow.client_message_resume();
        } catch (e) {
          console.warn("client_message_resume() unavailable:", e);
        }
      };

      const showQR = () => {
        const container = document.getElementById("qr-container");
        container.innerHTML = "";

        const qr = qrcode(0, "M");
        qr.addData(window.location.href);
        qr.make();

        container.innerHTML = qr.createSvgTag({
          cellSize: 5,
          margin: 4,
          scalable: true,
        });

        const svg = container.querySelector("svg");
        if (svg) {
          svg.style.width = "200px";
          svg.style.height = "200px";
        }

        document.getElementById("qr-modal").classList.add("active");
      };

      const closeQR = (e) => {
        if (!e || e.target === e.currentTarget) {
          document.getElementById("qr-modal").classList.remove("active");
        }
      };

      const copyLink = (btn) => {
        navigator.clipboard
          .writeText(window.location.href)
          .then(() => {
            const orig = btn.textContent;
            btn.textContent = "Скопировано!";
            setTimeout(() => (btn.textContent = orig), 1500);
          })
          .catch(() => console.warn("Clipboard API недоступен"));
      };

      document.title = `${clientName} / ${projectName} — Просмотр баннера`;
      frame.src = bannerUrl;

      if (
        initialSize &&
        sizeSelect.querySelector(`option[value="${initialSize}"]`)
      ) {
        sizeSelect.value = initialSize;
      }

      requestAnimationFrame(() => {
        onSizeChange();
      });

      frame.addEventListener("load", () => autoFitScale());

      if (!params.get("size")) {
        fetch(bannerUrl)
          .then((r) => r.text())
          .then((html) => {
            const match = html.match(
              /<meta[^>]+name=["']banner-platform["'][^>]+content=["']([^"']+)["']/i,
            );
            if (match) {
              const platform = match[1];
              if (sizeSelect.querySelector(`option[value="${platform}"]`)) {
                sizeSelect.value = platform;
                onSizeChange();
              }
            }
          })
          .catch(() => {});
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeQR();
      });

      window.addEventListener("resize", () => autoFitScale());
    </script>
  </body>
</html>
