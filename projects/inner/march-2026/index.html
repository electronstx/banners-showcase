                var aBeach = makeLink(URL);

                root.innerHTML = '';
                root.appendChild(img);
                root.appendChild(aHome);
                root.appendChild(aBeach);

                function layout() {
                    var docEl = document.documentElement;
                    var screenW = window.innerWidth || docEl.clientWidth || BASE_W;
                    var screenH = window.innerHeight || docEl.clientHeight || BASE_H;

                    var displayW, displayH;
                    if (screenW / screenH > TARGET_RATIO) {
                        displayH = screenH;
                        displayW = displayH * TARGET_RATIO;
                    } else {
                        displayW = screenW;
                        displayH = displayW / TARGET_RATIO;
                    }

                    root.style.width = displayW + 'px';
                    root.style.height = displayH + 'px';

                    var scaleX = displayW / BASE_W;
                    var scaleY = displayH / BASE_H;

                    setRectFromCenter(aHome, home.cx, home.cy, home.w, home.h, scaleX, scaleY);
                    setRectFromCenter(aBeach, beach.cx, beach.cy, beach.w, beach.h, scaleX, scaleY);
                }

                if (window.addEventListener) {
                    window.addEventListener('resize', layout);
                } else {
                    window.onresize = layout;
                }

                layout();
            })();
        </script>
    </body>
</html>
